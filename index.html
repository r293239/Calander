<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            color: #e6edf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #010409;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            flex-shrink: 0;
        }
        .title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #f778ba);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .url-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        #url-input {
            flex: 1;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
            font-family: monospace;
        }
        select, button {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            padding: 0 16px;
            font-weight: 500;
            cursor: pointer;
            height: 40px;
        }
        button.primary { background: #238636; border-color: #2ea043; }
        button.primary:hover { background: #2ea043; }
        button:hover { background: #30363d; }
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .quick-link {
            color: #58a6ff;
            cursor: pointer;
            background: #161b22;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            border-bottom: 1px solid #30363d;
        }
        .tab {
            background: none;
            border: none;
            padding: 8px 20px;
            color: #8b949e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
        #content { flex: 1; display: flex; overflow: hidden; }
        .panel { flex: 1; display: none; overflow: auto; }
        .panel.active { display: block; }
        .source-area {
            width: 100%;
            height: 100%;
            background: #0a0c10;
            color: #e6edf3;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            padding: 16px;
            border: none;
            resize: none;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .log-box {
            background: #0a0c10;
            height: 100%;
            overflow-y: auto;
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry { padding: 6px 0; border-bottom: 1px solid #1e242c; }
        .log-info { color: #79c0ff; }
        .log-success { color: #56d364; }
        .log-error { color: #f85149; }
        .log-warning { color: #e3b341; }
        #status {
            background: #010409;
            border-top: 1px solid #21262d;
            padding: 6px 20px;
            font-size: 12px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="title">PROXY</div>
    <div class="url-bar">
        <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
        <select id="method-select">
            <option value="archive">📦 Archive</option>
            <option value="reconstruct">🔧 Reconstruct</option>
        </select>
        <button class="primary" id="loadBtn">🌐 LOAD</button>
        <button id="getSourceBtn">📄 SOURCE</button>
        <button id="inspectBtn">🔍 INSPECT</button>
    </div>
    <div class="action-group">
        <button id="downloadBtn">💾 Download</button>
        <button id="copyBtn">📋 Copy</button>
        <button id="newTabBtn">🔗 New Tab</button>
        <button id="clearLogsBtn">🗑️ Clear</button>
    </div>
    <div class="quick-links">
        <span style="color:#6e7681">⚡ Quick:</span>
        <span class="quick-link" data-url="https://www.google.com">Google</span>
        <span class="quick-link" data-url="https://github.com">GitHub</span>
        <span class="quick-link" data-url="https://news.ycombinator.com">HN</span>
        <span class="quick-link" data-url="https://example.com">Example</span>
        <span class="quick-link" data-url="https://info.cern.ch">CERN</span>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="view">👁️ View</button>
        <button class="tab" data-tab="source">📄 Source</button>
        <button class="tab" data-tab="logs">📋 Logs</button>
    </div>
</div>

<div id="content">
    <div id="view-panel" class="panel active">
        <iframe id="viewer-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-downloads"></iframe>
    </div>
    <div id="source-panel" class="panel">
        <textarea id="source-output" class="source-area" readonly placeholder="// Click SOURCE or INSPECT to analyze HTML"></textarea>
    </div>
    <div id="logs-panel" class="panel">
        <div id="log-output" class="log-box">
            <div class="log-entry log-info">⚡ Proxy Ready</div>
            <div class="log-entry log-success">✅ Archive or Reconstruct mode</div>
        </div>
    </div>
</div>
<div id="status">
    <span id="status-text">● Ready</span>
    <span id="url-display"></span>
</div>

<script>
    const urlInput = document.getElementById('url-input');
    const methodSelect = document.getElementById('method-select');
    const viewerFrame = document.getElementById('viewer-frame');
    const sourceOutput = document.getElementById('source-output');
    const logContainer = document.getElementById('log-output');
    const statusSpan = document.getElementById('status-text');
    const urlDisplaySpan = document.getElementById('url-display');

    let currentHtml = '';
    let currentBaseUrl = '';
    let resourceCache = new Map();
    
    const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

    function addLog(msg, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        entry.textContent = `[${time}] ${msg}`;
        logContainer.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        statusSpan.textContent = msg.slice(0, 80);
        while (logContainer.children.length > 150) logContainer.removeChild(logContainer.firstChild);
    }

    function resolveUrl(url, baseUrl) {
        if (!url || url.startsWith('data:') || url.startsWith('blob:') || url.startsWith('#')) {
            return url;
        }
        try {
            const urlObj = new URL(baseUrl);
            if (url.startsWith('//')) {
                return 'https:' + url;
            } else if (url.startsWith('/')) {
                return urlObj.origin + url;
            } else if (!url.startsWith('http')) {
                const basePath = urlObj.pathname.substring(0, urlObj.pathname.lastIndexOf('/') + 1);
                return urlObj.origin + basePath + url;
            }
            return url;
        } catch(e) {
            return url;
        }
    }

    async function fetchResource(url, type = 'text') {
        if (resourceCache.has(url)) {
            addLog(`Cache hit: ${url.substring(0, 60)}`, 'success');
            return resourceCache.get(url);
        }
        
        try {
            const proxyUrl = CORS_PROXY + encodeURIComponent(url);
            addLog(`GET ${url.substring(0, 50)}...`, 'info');
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            const response = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            let content;
            if (type === 'text') {
                content = await response.text();
            } else {
                const blob = await response.blob();
                content = URL.createObjectURL(blob);
            }
            
            resourceCache.set(url, content);
            addLog(`Fetched: ${url.substring(0, 60)} (${content.length} bytes)`, 'success');
            return content;
        } catch (error) {
            addLog(`Failed: ${url.substring(0, 50)} - ${error.message}`, 'error');
            return null;
        }
    }

    async function inspectAndFetch(html, baseUrl) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Extract all resources
        const resources = {
            scripts: [],
            styles: [],
            images: [],
            links: []
        };
        
        // Scripts
        doc.querySelectorAll('script[src]').forEach(el => {
            const src = resolveUrl(el.getAttribute('src'), baseUrl);
            if (src) resources.scripts.push(src);
        });
        
        // Stylesheets
        doc.querySelectorAll('link[rel="stylesheet"]').forEach(el => {
            const href = resolveUrl(el.getAttribute('href'), baseUrl);
            if (href) resources.styles.push(href);
        });
        
        // Images
        doc.querySelectorAll('img[src]').forEach(el => {
            const src = resolveUrl(el.getAttribute('src'), baseUrl);
            if (src) resources.images.push(src);
        });
        
        // CSS url() and @import
        const styleTags = doc.querySelectorAll('style');
        styleTags.forEach(style => {
            const cssText = style.textContent;
            const urlMatches = cssText.matchAll(/url\(["']?([^)"']+)["']?\)/g);
            for (const match of urlMatches) {
                const url = resolveUrl(match[1], baseUrl);
                if (url && url.startsWith('http')) resources.images.push(url);
            }
            
            const importMatches = cssText.matchAll(/@import\s+["']([^"']+)["']/g);
            for (const match of importMatches) {
                const url = resolveUrl(match[1], baseUrl);
                if (url) resources.styles.push(url);
            }
        });
        
        addLog(`Found: ${resources.scripts.length} scripts, ${resources.styles.length} styles, ${resources.images.length} images`, 'info');
        
        // Fetch all scripts
        for (const url of resources.scripts) {
            await fetchResource(url, 'text');
        }
        
        // Fetch all styles
        for (const url of resources.styles) {
            await fetchResource(url, 'text');
        }
        
        // Fetch images as blobs
        for (const url of resources.images.slice(0, 20)) { // Limit images
            await fetchResource(url, 'blob');
        }
        
        return { doc, resources };
    }

    async function rebuildPage(html, baseUrl) {
        addLog(`Inspecting HTML...`, 'info');
        const { doc, resources } = await inspectAndFetch(html, baseUrl);
        
        // Rewrite URLs to use cached versions
        doc.querySelectorAll('script[src]').forEach(el => {
            const src = resolveUrl(el.getAttribute('src'), baseUrl);
            if (src && resourceCache.has(src)) {
                const content = resourceCache.get(src);
                const blob = new Blob([content], { type: 'application/javascript' });
                const blobUrl = URL.createObjectURL(blob);
                el.setAttribute('src', blobUrl);
                addLog(`Injected script: ${src.substring(0, 40)}`, 'success');
            }
        });
        
        doc.querySelectorAll('link[rel="stylesheet"]').forEach(el => {
            const href = resolveUrl(el.getAttribute('href'), baseUrl);
            if (href && resourceCache.has(href)) {
                const content = resourceCache.get(href);
                const style = doc.createElement('style');
                style.textContent = content;
                el.replaceWith(style);
                addLog(`Injected style: ${href.substring(0, 40)}`, 'success');
            }
        });
        
        doc.querySelectorAll('img[src]').forEach(el => {
            const src = resolveUrl(el.getAttribute('src'), baseUrl);
            if (src && resourceCache.has(src)) {
                el.setAttribute('src', resourceCache.get(src));
            }
        });
        
        // Add base tag
        if (!doc.querySelector('base')) {
            const base = doc.createElement('base');
            base.href = baseUrl;
            doc.head.insertBefore(base, doc.head.firstChild);
        }
        
        // Extract inline scripts and execute them
        const inlineScripts = [];
        doc.querySelectorAll('script:not([src])').forEach(el => {
            inlineScripts.push(el.textContent);
        });
        
        const finalHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
        
        return { html: finalHtml, inlineScripts, resources };
    }

    async function fetchAndReconstruct(url) {
        resourceCache.clear();
        addLog(`Starting reconstruction: ${url}`, 'info');
        
        try {
            // Fetch main HTML
            const html = await fetchResource(url, 'text');
            if (!html) throw new Error('Failed to fetch HTML');
            
            currentBaseUrl = url;
            
            // Rebuild with fetched resources
            const { html: finalHtml, resources } = await rebuildPage(html, url);
            currentHtml = finalHtml;
            
            sourceOutput.value = `<!-- URL: ${url} -->\n<!-- Resources: ${resources.scripts.length} scripts, ${resources.styles.length} styles -->\n<!-- Cache: ${resourceCache.size} items -->\n\n${finalHtml}`;
            
            // Load in iframe
            const blob = new Blob([finalHtml], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            viewerFrame.src = blobUrl;
            
            viewerFrame.onload = () => {
                URL.revokeObjectURL(blobUrl);
                addLog(`Page rebuilt with ${resourceCache.size} resources`, 'success');
            };
            
            urlDisplaySpan.textContent = url;
            
        } catch (error) {
            addLog(`Reconstruction failed: ${error.message}`, 'error');
        }
    }

    async function inspectOnly() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        
        addLog(`Inspecting: ${targetUrl}`, 'info');
        
        try {
            const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);
            const response = await fetch(proxyUrl);
            const html = await response.text();
            
            const { resources } = await inspectAndFetch(html, targetUrl);
            
            let report = `=== INSPECTION REPORT ===\n`;
            report += `URL: ${targetUrl}\n`;
            report += `HTML Size: ${html.length} bytes\n\n`;
            report += `SCRIPTS (${resources.scripts.length}):\n`;
            resources.scripts.forEach(s => report += `  📜 ${s}\n`);
            report += `\nSTYLES (${resources.styles.length}):\n`;
            resources.styles.forEach(s => report += `  🎨 ${s}\n`);
            report += `\nIMAGES (${resources.images.length}):\n`;
            resources.images.slice(0, 30).forEach(i => report += `  🖼️ ${i}\n`);
            if (resources.images.length > 30) report += `  ... and ${resources.images.length - 30} more\n`;
            
            sourceOutput.value = report;
            addLog(`Inspection complete: ${resources.scripts.length} scripts, ${resources.styles.length} styles`, 'success');
            switchTab('source');
            
        } catch (error) {
            addLog(`Inspection failed: ${error.message}`, 'error');
        }
    }

    function loadArchive(url) {
        if (!url.startsWith('http')) url = 'https://' + url;
        const archiveUrl = `https://web.archive.org/web/${url}`;
        
        addLog(`Archive: ${archiveUrl}`, 'info');
        viewerFrame.src = archiveUrl;
        urlDisplaySpan.textContent = url;
        addLog(`Archive mode`, 'success');
    }

    function loadPage() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        urlInput.value = targetUrl;
        
        const method = methodSelect.value;
        
        if (method === 'archive') {
            loadArchive(targetUrl);
        } else {
            fetchAndReconstruct(targetUrl);
        }
    }

    async function fetchSource() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) {
            addLog('Enter URL first', 'error');
            return;
        }
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        
        addLog(`Fetching source: ${targetUrl}`, 'info');
        
        try {
            const html = await fetchResource(targetUrl, 'text');
            if (html) {
                currentHtml = html;
                sourceOutput.value = `<!-- URL: ${targetUrl} -->\n<!-- Size: ${html.length} bytes -->\n\n${html}`;
                addLog(`Source: ${html.length} bytes`, 'success');
                switchTab('source');
            }
        } catch (error) {
            addLog(`Failed: ${error.message}`, 'error');
        }
    }

    function downloadHtml() {
        if (!currentHtml) {
            addLog('No source to download', 'warning');
            return;
        }
        const blob = new Blob([currentHtml], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `page_${Date.now()}.html`;
        a.click();
        URL.revokeObjectURL(a.href);
        addLog('Downloaded', 'success');
    }

    function copySource() {
        if (!currentHtml) {
            addLog('No source to copy', 'error');
            return;
        }
        navigator.clipboard.writeText(sourceOutput.value).then(() => {
            addLog('Copied', 'success');
        }).catch(() => addLog('Copy failed', 'error'));
    }

    function openInNewTab() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        
        if (methodSelect.value === 'archive') {
            window.open(`https://web.archive.org/web/${targetUrl}`, '_blank');
        } else {
            window.open(targetUrl, '_blank');
        }
        addLog('Opened in new tab', 'info');
    }

    function clearLogs() {
        logContainer.innerHTML = '<div class="log-entry log-info">🧹 Cleared</div>';
        addLog('Logs cleared', 'info');
    }

    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`${tabId}-panel`).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
    }

    document.getElementById('loadBtn').addEventListener('click', loadPage);
    document.getElementById('getSourceBtn').addEventListener('click', fetchSource);
    document.getElementById('inspectBtn').addEventListener('click', inspectOnly);
    document.getElementById('downloadBtn').addEventListener('click', downloadHtml);
    document.getElementById('copyBtn').addEventListener('click', copySource);
    document.getElementById('newTabBtn').addEventListener('click', openInNewTab);
    document.getElementById('clearLogsBtn').addEventListener('click', clearLogs);
    
    document.querySelectorAll('.quick-link').forEach(el => {
        el.addEventListener('click', () => {
            const u = el.getAttribute('data-url');
            if (u) {
                urlInput.value = u;
                loadPage();
            }
        });
    });
    
    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.getAttribute('data-tab');
            if (tab) switchTab(tab);
        });
    });
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadPage();
    });
    
    addLog('Archive + Reconstruct ready', 'success');
    addLog('INSPECT analyzes HTML resources', 'info');
    setTimeout(() => loadPage(), 100);
</script>
</body>
</html>
