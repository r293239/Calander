<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0c10;
            color: #e6edf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #010409;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            flex-shrink: 0;
        }
        .title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #f778ba);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .url-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        #url-input {
            flex: 1;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
            font-family: monospace;
        }
        select, button {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            padding: 0 16px;
            font-weight: 500;
            cursor: pointer;
            height: 40px;
        }
        button.primary { background: #238636; border-color: #2ea043; }
        button.primary:hover { background: #2ea043; }
        button:hover { background: #30363d; }
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .quick-link {
            color: #58a6ff;
            cursor: pointer;
            background: #161b22;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            border-bottom: 1px solid #30363d;
        }
        .tab {
            background: none;
            border: none;
            padding: 8px 20px;
            color: #8b949e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
        #content { flex: 1; display: flex; overflow: hidden; }
        .panel { flex: 1; display: none; overflow: auto; }
        .panel.active { display: block; }
        .source-area {
            width: 100%;
            height: 100%;
            background: #0a0c10;
            color: #e6edf3;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 12px;
            padding: 16px;
            border: none;
            resize: none;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .log-box {
            background: #0a0c10;
            height: 100%;
            overflow-y: auto;
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry { padding: 6px 0; border-bottom: 1px solid #1e242c; }
        .log-info { color: #79c0ff; }
        .log-success { color: #56d364; }
        .log-error { color: #f85149; }
        .log-warning { color: #e3b341; }
        #status {
            background: #010409;
            border-top: 1px solid #21262d;
            padding: 6px 20px;
            font-size: 12px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .reconstructed-view {
            width: 100%;
            height: 100%;
            background: white;
        }
        .bookmark-card {
            background: #161b22;
            border-radius: 12px;
            padding: 16px;
            margin: 16px;
        }
        .bookmark-link {
            display: inline-block;
            background: #1f6feb;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 12px;
            margin: 5px;
        }
        .js-content {
            background: #0d1117;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 11px;
            max-height: 300px;
            overflow: auto;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="title">PROXY</div>
    <div class="url-bar">
        <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
        <select id="method-select">
            <option value="wayback" selected>📦 Internet Archive (Wayback Machine)</option>
            <option value="google-cache">🗄️ Google Cache</option>
            <option value="archive-today">📑 Archive.today</option>
            <option value="12ft">⚡ 12ft Ladder</option>
        </select>
        <button class="primary" id="loadBtn">🌐 LOAD</button>
        <button id="reconstructBtn">🔧 RECONSTRUCT (HTML + JS)</button>
    </div>
    <div class="action-group">
        <button id="downloadBtn">💾 Download Reconstructed</button>
        <button id="copyBtn">📋 Copy Source</button>
        <button id="clearLogsBtn">🗑️ Clear Logs</button>
    </div>
    <div class="quick-links">
        <span style="color:#6e7681">⚡ test:</span>
        <span class="quick-link" data-url="https://www.google.com">Google</span>
        <span class="quick-link" data-url="https://github.com">GitHub</span>
        <span class="quick-link" data-url="https://news.ycombinator.com">HN</span>
        <span class="quick-link" data-url="https://en.wikipedia.org/wiki/Main_Page">Wikipedia</span>
        <span class="quick-link" data-url="https://example.com">Example</span>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="view">👁️ View</button>
        <button class="tab" data-tab="source">📄 HTML Source</button>
        <button class="tab" data-tab="js">📜 JavaScript Files</button>
        <button class="tab" data-tab="logs">📋 Logs</button>
    </div>
</div>

<div id="content">
    <div id="view-panel" class="panel active">
        <iframe id="viewer-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
    </div>
    <div id="source-panel" class="panel">
        <textarea id="source-output" class="source-area" readonly placeholder="// Click RECONSTRUCT to fetch HTML source + all JavaScript files\n// The complete website code will be reconstructed here"></textarea>
    </div>
    <div id="js-panel" class="panel">
        <div id="js-output" class="source-area" style="overflow-y:auto">
            <div style="padding:16px; color:#8b949e">// JavaScript files will appear here after reconstruction</div>
        </div>
    </div>
    <div id="logs-panel" class="panel">
        <div id="log-output" class="log-box">
            <div class="log-entry log-info">⚡ PROXY - Full Website Reconstructor</div>
            <div class="log-entry log-success">✅ Enter URL → LOAD → RECONSTRUCT to get HTML + ALL JavaScript files</div>
        </div>
    </div>
</div>
<div id="status">
    <span id="status-text">● ready</span>
    <span id="url-display"></span>
</div>

<script>
    const urlInput = document.getElementById('url-input');
    const methodSelect = document.getElementById('method-select');
    const viewerFrame = document.getElementById('viewer-frame');
    const sourceOutput = document.getElementById('source-output');
    const jsOutput = document.getElementById('js-output');
    const logContainer = document.getElementById('log-output');
    const statusSpan = document.getElementById('status-text');
    const urlDisplaySpan = document.getElementById('url-display');

    let currentHtml = '';
    let currentJsFiles = new Map(); // url -> content
    let currentTargetUrl = '';

    function addLog(msg, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        entry.textContent = `[${time}] ${msg}`;
        logContainer.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        statusSpan.textContent = msg.slice(0, 80);
        while (logContainer.children.length > 150) logContainer.removeChild(logContainer.firstChild);
    }

    // Extract ALL JavaScript URLs from HTML
    function extractJavaScriptUrls(html, baseUrl) {
        const jsUrls = new Set();
        const scriptRegex = /<script\s+(?:[^>]*?\s+)?src=["']([^"']+)["']/gi;
        let match;
        while ((match = scriptRegex.exec(html)) !== null) {
            let url = match[1];
            if (url && !url.startsWith('data:') && !url.startsWith('blob:') && !url.startsWith('javascript:')) {
                try {
                    if (url.startsWith('//')) url = 'https:' + url;
                    else if (url.startsWith('/') && baseUrl) url = new URL(url, baseUrl).href;
                    else if (!url.startsWith('http') && baseUrl) url = new URL(url, baseUrl).href;
                    jsUrls.add(url);
                } catch(e) { jsUrls.add(url); }
            }
        }
        // Also get inline scripts (no src)
        return Array.from(jsUrls);
    }

    // Fetch JavaScript file content through proxy
    async function fetchJsContent(jsUrl) {
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(jsUrl)}`;
        try {
            const response = await fetch(proxyUrl, { timeout: 10000 });
            if (response.ok) {
                const content = await response.text();
                return { url: jsUrl, content: content, success: true };
            }
        } catch(e) {
            return { url: jsUrl, content: `// Failed to fetch: ${e.message}`, success: false };
        }
        return { url: jsUrl, content: '// Failed to fetch', success: false };
    }

    // Fetch HTML through the selected method
    async function fetchHtml(targetUrl, method) {
        let fetchUrl;
        if (method === 'wayback') {
            const archiveUrl = `https://web.archive.org/web/${targetUrl}`;
            fetchUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(archiveUrl)}`;
            addLog(`📦 Fetching from Internet Archive...`, 'info');
        } else if (method === 'google-cache') {
            const cacheUrl = `https://webcache.googleusercontent.com/search?q=cache:${encodeURIComponent(targetUrl)}`;
            fetchUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(cacheUrl)}`;
        } else if (method === 'archive-today') {
            const archiveUrl = `https://archive.today/${targetUrl}`;
            fetchUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(archiveUrl)}`;
        } else if (method === '12ft') {
            const twelveUrl = `https://12ft.io/${targetUrl}`;
            fetchUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(twelveUrl)}`;
        } else {
            fetchUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
        }
        
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.text();
    }

    // Main reconstruction function - gets HTML + all JS files
    async function reconstructFullSite() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) {
            addLog('❌ Enter a URL', 'error');
            return;
        }
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        urlInput.value = targetUrl;
        currentTargetUrl = targetUrl;
        const method = methodSelect.value;
        
        addLog(`🔧 RECONSTRUCTING: ${targetUrl} via ${method}`, 'info');
        urlDisplaySpan.textContent = targetUrl;
        jsOutput.innerHTML = '<div style="padding:16px; color:#8b949e">⏳ Fetching HTML and extracting JavaScript URLs...</div>';
        
        try {
            // Step 1: Fetch HTML
            const html = await fetchHtml(targetUrl, method);
            currentHtml = html;
            addLog(`✅ HTML fetched: ${html.length.toLocaleString()} bytes`, 'success');
            
            // Step 2: Extract JS URLs
            const jsUrls = extractJavaScriptUrls(html, targetUrl);
            addLog(`📜 Found ${jsUrls.length} JavaScript file(s)`, 'info');
            
            // Step 3: Fetch each JS file
            currentJsFiles.clear();
            let jsDisplay = `<div style="padding:16px"><h3 style="color:#58a6ff; margin-bottom:16px">📜 JavaScript Files (${jsUrls.length})</h3>`;
            
            if (jsUrls.length === 0) {
                jsDisplay += `<p style="color:#8b949e">No external JavaScript files found in this page.</p>`;
            }
            
            for (let i = 0; i < jsUrls.length; i++) {
                const jsUrl = jsUrls[i];
                addLog(`📥 Fetching JS [${i+1}/${jsUrls.length}]: ${jsUrl.substring(0, 60)}...`, 'info');
                const result = await fetchJsContent(jsUrl);
                currentJsFiles.set(result.url, result.content);
                
                const statusIcon = result.success ? '✅' : '❌';
                jsDisplay += `
                    <div style="margin-bottom: 20px; border: 1px solid #30363d; border-radius: 8px; overflow: hidden;">
                        <div style="background: #161b22; padding: 10px 16px; font-family: monospace; font-size: 12px; border-bottom: 1px solid #30363d;">
                            ${statusIcon} <strong style="color:#58a6ff">${result.url}</strong>
                            <span style="color:#8b949e; margin-left: 10px">${result.content.length.toLocaleString()} bytes</span>
                        </div>
                        <div style="background: #0d1117; padding: 12px; max-height: 300px; overflow: auto; font-family: monospace; font-size: 11px; white-space: pre-wrap;">
                            ${escapeHtml(result.content.substring(0, 5000))}${result.content.length > 5000 ? '\n\n... (truncated)' : ''}
                        </div>
                    </div>
                `;
            }
            
            jsDisplay += `</div>`;
            jsOutput.innerHTML = jsDisplay;
            
            // Step 4: Build complete reconstructed source with JS content embedded
            let reconstructedHtml = html;
            reconstructedHtml += `\n\n<!-- ============================================= -->\n`;
            reconstructedHtml += `<!-- RECONSTRUCTED SITE REPORT                      -->\n`;
            reconstructedHtml += `<!-- Original URL: ${targetUrl} -->\n`;
            reconstructedHtml += `<!-- Method: ${method} -->\n`;
            reconstructedHtml += `<!-- Date: ${new Date().toISOString()} -->\n`;
            reconstructedHtml += `<!-- Total JS files: ${jsUrls.length} -->\n`;
            reconstructedHtml += `<!-- ============================================= -->\n\n`;
            
            reconstructedHtml += `<!-- ========== EXTRACTED JAVASCRIPT FILES ========== -->\n`;
            for (const [url, content] of currentJsFiles) {
                reconstructedHtml += `\n<!-- ========================================= -->\n`;
                reconstructedHtml += `<!-- JS: ${url} -->\n`;
                reconstructedHtml += `<!-- Size: ${content.length} bytes -->\n`;
                reconstructedHtml += `/*\n${content.substring(0, 10000)}${content.length > 10000 ? '\n... (truncated, full JS in separate panel)' : ''}\n*/\n`;
            }
            
            sourceOutput.value = reconstructedHtml;
            
            addLog(`🎉 RECONSTRUCTION COMPLETE! ${jsUrls.length} JS files fetched`, 'success');
            addLog(`💾 Switch to "HTML Source" tab to see full HTML + embedded JS`, 'success');
            
            // Also load the original page in iframe
            const viewUrl = method === 'wayback' ? `https://web.archive.org/web/${targetUrl}` :
                           method === 'google-cache' ? `https://webcache.googleusercontent.com/search?q=cache:${encodeURIComponent(targetUrl)}` :
                           method === 'archive-today' ? `https://archive.today/${targetUrl}` :
                           `https://12ft.io/${targetUrl}`;
            viewerFrame.src = viewUrl;
            
        } catch (error) {
            addLog(`❌ Reconstruction failed: ${error.message}`, 'error');
            sourceOutput.value = `// ERROR: ${error.message}\n// Try a different URL or proxy method`;
            jsOutput.innerHTML = `<div style="padding:16px; color:#f85149">❌ Failed to reconstruct: ${error.message}</div>`;
        }
    }

    // Simple load (just iframe)
    function loadPage() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        urlInput.value = targetUrl;
        currentTargetUrl = targetUrl;
        const method = methodSelect.value;
        
        const viewUrl = method === 'wayback' ? `https://web.archive.org/web/${targetUrl}` :
                       method === 'google-cache' ? `https://webcache.googleusercontent.com/search?q=cache:${encodeURIComponent(targetUrl)}` :
                       method === 'archive-today' ? `https://archive.today/${targetUrl}` :
                       `https://12ft.io/${targetUrl}`;
        
        addLog(`🌐 Loading: ${viewUrl}`, 'info');
        urlDisplaySpan.textContent = targetUrl;
        viewerFrame.src = viewUrl;
        
        addLog(`💡 Click "RECONSTRUCT (HTML + JS)" to fetch all source code and JavaScript files`, 'info');
    }

    function downloadReconstructed() {
        if (!currentHtml && sourceOutput.value === '// Click RECONSTRUCT to fetch HTML source...') {
            addLog('No reconstructed data. Click RECONSTRUCT first.', 'warning');
            return;
        }
        const content = sourceOutput.value;
        const blob = new Blob([content], { type: 'text/html' });
        const a = document.createElement('a');
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = `reconstructed_${Date.now()}.html`;
        a.click();
        URL.revokeObjectURL(url);
        addLog('💾 Reconstructed site downloaded (HTML + JS embedded)', 'success');
    }

    function copySource() {
        const content = sourceOutput.value;
        if (!content || content === '// Click RECONSTRUCT to fetch HTML source...') {
            addLog('No source to copy', 'error');
            return;
        }
        navigator.clipboard.writeText(content).then(() => {
            addLog('📋 Source copied to clipboard', 'success');
        }).catch(() => addLog('Clipboard failed', 'error'));
    }

    function clearLogs() {
        logContainer.innerHTML = '<div class="log-entry log-info">🧹 Logs cleared</div><div class="log-entry log-success">Ready for next reconstruction</div>';
        addLog('Logs cleared', 'info');
    }

    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`${tabId}-panel`).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Event listeners
    document.getElementById('loadBtn').addEventListener('click', loadPage);
    document.getElementById('reconstructBtn').addEventListener('click', reconstructFullSite);
    document.getElementById('downloadBtn').addEventListener('click', downloadReconstructed);
    document.getElementById('copyBtn').addEventListener('click', copySource);
    document.getElementById('clearLogsBtn').addEventListener('click', clearLogs);
    
    document.querySelectorAll('.quick-link').forEach(el => {
        el.addEventListener('click', () => {
            const u = el.getAttribute('data-url');
            if (u) {
                urlInput.value = u;
                loadPage();
            }
        });
    });
    
    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const tab = btn.getAttribute('data-tab');
            if (tab) switchTab(tab);
        });
    });
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadPage();
    });
    
    // Initial
    addLog('✨ FULL RECONSTRUCTION PROXY ACTIVE', 'success');
    addLog('📌 Step 1: Enter URL → LOAD', 'info');
    addLog('📌 Step 2: Click RECONSTRUCT to fetch HTML + ALL JavaScript files', 'info');
    setTimeout(() => loadPage(), 100);
</script>
</body>
</html>
