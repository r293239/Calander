<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            color: #e6edf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #010409;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            flex-shrink: 0;
        }
        .title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #f778ba);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .url-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        #url-input {
            flex: 1;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
            font-family: monospace;
        }
        select, button {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            padding: 0 16px;
            font-weight: 500;
            cursor: pointer;
            height: 40px;
        }
        button.primary { background: #238636; border-color: #2ea043; }
        button.primary:hover { background: #2ea043; }
        button:hover { background: #30363d; }
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .quick-link {
            color: #58a6ff;
            cursor: pointer;
            background: #161b22;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            border-bottom: 1px solid #30363d;
        }
        .tab {
            background: none;
            border: none;
            padding: 8px 20px;
            color: #8b949e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
        #content { flex: 1; display: flex; overflow: hidden; }
        .panel { flex: 1; display: none; overflow: auto; }
        .panel.active { display: block; }
        .source-area {
            width: 100%;
            height: 100%;
            background: #0a0c10;
            color: #e6edf3;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            padding: 16px;
            border: none;
            resize: none;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .log-box {
            background: #0a0c10;
            height: 100%;
            overflow-y: auto;
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry { padding: 6px 0; border-bottom: 1px solid #1e242c; }
        .log-info { color: #79c0ff; }
        .log-success { color: #56d364; }
        .log-error { color: #f85149; }
        #status {
            background: #010409;
            border-top: 1px solid #21262d;
            padding: 6px 20px;
            font-size: 12px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="title">PROXY</div>
    <div class="url-bar">
        <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
        <select id="method-select">
            <option value="archive">📦 Archive</option>
            <option value="proxy">🌐 WebProxy</option>
            <option value="direct">➡️ Direct</option>
        </select>
        <button class="primary" id="loadBtn">🌐 LOAD</button>
        <button id="getSourceBtn">📄 SOURCE</button>
    </div>
    <div class="action-group">
        <button id="downloadBtn">💾 Download</button>
        <button id="copyBtn">📋 Copy</button>
        <button id="newTabBtn">🔗 New Tab</button>
        <button id="clearLogsBtn">🗑️ Clear</button>
    </div>
    <div class="quick-links">
        <span style="color:#6e7681">⚡ Quick:</span>
        <span class="quick-link" data-url="https://www.google.com">Google</span>
        <span class="quick-link" data-url="https://github.com">GitHub</span>
        <span class="quick-link" data-url="https://news.ycombinator.com">HN</span>
        <span class="quick-link" data-url="https://example.com">Example</span>
        <span class="quick-link" data-url="https://info.cern.ch">CERN</span>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="view">👁️ View</button>
        <button class="tab" data-tab="source">📄 Source</button>
        <button class="tab" data-tab="logs">📋 Logs</button>
    </div>
</div>

<div id="content">
    <div id="view-panel" class="panel active">
        <iframe id="viewer-frame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-downloads allow-pointer-lock allow-popups-to-escape-sandbox"></iframe>
    </div>
    <div id="source-panel" class="panel">
        <textarea id="source-output" class="source-area" readonly placeholder="// Click SOURCE to fetch HTML"></textarea>
    </div>
    <div id="logs-panel" class="panel">
        <div id="log-output" class="log-box">
            <div class="log-entry log-info">⚡ Proxy Ready</div>
            <div class="log-entry log-success">✅ Use WebProxy for full JS support</div>
        </div>
    </div>
</div>
<div id="status">
    <span id="status-text">● Ready</span>
    <span id="url-display"></span>
</div>

<script>
    const urlInput = document.getElementById('url-input');
    const methodSelect = document.getElementById('method-select');
    const viewerFrame = document.getElementById('viewer-frame');
    const sourceOutput = document.getElementById('source-output');
    const logContainer = document.getElementById('log-output');
    const statusSpan = document.getElementById('status-text');
    const urlDisplaySpan = document.getElementById('url-display');

    let currentHtml = '';
    
    // Working web proxies that handle JavaScript properly
    const WEB_PROXIES = [
        { name: 'CroxyProxy', url: 'https://www.croxyproxy.com/' },
        { name: 'ProxySite', url: 'https://www.proxysite.com/' },
        { name: 'BlockAway', url: 'https://www.blockaway.com/' },
        { name: 'GenMirror', url: 'https://www.genmirror.com/' },
        { name: 'Proxyium', url: 'https://proxyium.com/' }
    ];
    
    let currentWebProxy = 0;

    function addLog(msg, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        entry.textContent = `[${time}] ${msg}`;
        logContainer.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        statusSpan.textContent = msg.slice(0, 80);
        while (logContainer.children.length > 150) logContainer.removeChild(logContainer.firstChild);
    }

    function buildProxyUrl(targetUrl, proxyIndex) {
        const proxy = WEB_PROXIES[proxyIndex];
        
        // Different proxies have different URL patterns
        switch(proxy.name) {
            case 'CroxyProxy':
                return `${proxy.url}_${targetUrl}`;
            case 'ProxySite':
                return `${proxy.url}?q=${encodeURIComponent(targetUrl)}`;
            case 'BlockAway':
                return `${proxy.url}?u=${encodeURIComponent(targetUrl)}`;
            case 'GenMirror':
                return `${proxy.url}?url=${encodeURIComponent(targetUrl)}`;
            case 'Proxyium':
                return `${proxy.url}?url=${encodeURIComponent(targetUrl)}`;
            default:
                return `${proxy.url}?url=${encodeURIComponent(targetUrl)}`;
        }
    }

    function loadWebProxy(url) {
        if (!url.startsWith('http')) url = 'https://' + url;
        
        const proxyUrl = buildProxyUrl(url, currentWebProxy);
        addLog(`Loading via ${WEB_PROXIES[currentWebProxy].name}`, 'info');
        
        viewerFrame.src = proxyUrl;
        urlDisplaySpan.textContent = url;
        
        viewerFrame.onload = () => {
            addLog(`Loaded with full JS support`, 'success');
        };
        
        viewerFrame.onerror = () => {
            addLog(`Failed to load, try next proxy`, 'warning');
            currentWebProxy = (currentWebProxy + 1) % WEB_PROXIES.length;
        };
    }

    function loadArchive(url) {
        if (!url.startsWith('http')) url = 'https://' + url;
        const archiveUrl = `https://web.archive.org/web/${url}`;
        
        addLog(`Archive: ${archiveUrl}`, 'info');
        viewerFrame.src = archiveUrl;
        urlDisplaySpan.textContent = url;
        addLog(`Archive mode`, 'success');
    }

    function loadDirect(url) {
        if (!url.startsWith('http')) url = 'https://' + url;
        
        addLog(`Direct: ${url}`, 'info');
        viewerFrame.src = url;
        urlDisplaySpan.textContent = url;
        addLog(`Direct mode`, 'success');
    }

    function loadPage() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        urlInput.value = targetUrl;
        
        const method = methodSelect.value;
        
        if (method === 'archive') {
            loadArchive(targetUrl);
        } else if (method === 'direct') {
            loadDirect(targetUrl);
        } else {
            loadWebProxy(targetUrl);
        }
    }

    async function fetchSource() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) {
            addLog('Enter URL first', 'error');
            return;
        }
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        
        addLog(`Fetching source: ${targetUrl}`, 'info');
        
        try {
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            const response = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const html = await response.text();
            currentHtml = html;
            
            sourceOutput.value = `<!-- URL: ${targetUrl} -->\n<!-- Size: ${html.length} bytes -->\n\n${html}`;
            
            addLog(`Source: ${html.length} bytes`, 'success');
            switchTab('source');
        } catch (error) {
            addLog(`Failed: ${error.message}`, 'error');
            sourceOutput.value = `// Error: ${error.message}`;
        }
    }

    function downloadHtml() {
        if (!currentHtml) {
            addLog('No source to download', 'warning');
            return;
        }
        const blob = new Blob([currentHtml], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `source_${Date.now()}.html`;
        a.click();
        URL.revokeObjectURL(a.href);
        addLog('Downloaded', 'success');
    }

    function copySource() {
        if (!currentHtml) {
            addLog('No source to copy', 'error');
            return;
        }
        navigator.clipboard.writeText(sourceOutput.value).then(() => {
            addLog('Copied', 'success');
        }).catch(() => addLog('Copy failed', 'error'));
    }

    function openInNewTab() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        
        const method = methodSelect.value;
        
        if (method === 'archive') {
            window.open(`https://web.archive.org/web/${targetUrl}`, '_blank');
        } else if (method === 'direct') {
            window.open(targetUrl, '_blank');
        } else {
            window.open(buildProxyUrl(targetUrl, currentWebProxy), '_blank');
        }
        addLog('Opened in new tab', 'info');
    }

    function clearLogs() {
        logContainer.innerHTML = '<div class="log-entry log-info">🧹 Cleared</div>';
        addLog('Logs cleared', 'info');
    }

    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`${tabId}-panel`).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
    }
    
    function cycleProxy() {
        currentWebProxy = (currentWebProxy + 1) % WEB_PROXIES.length;
        addLog(`Switched to ${WEB_PROXIES[currentWebProxy].name}`, 'info');
        loadPage();
    }

    document.getElementById('loadBtn').addEventListener('click', loadPage);
    document.getElementById('getSourceBtn').addEventListener('click', fetchSource);
    document.getElementById('downloadBtn').addEventListener('click', downloadHtml);
    document.getElementById('copyBtn').addEventListener('click', copySource);
    document.getElementById('newTabBtn').addEventListener('click', openInNewTab);
    document.getElementById('clearLogsBtn').addEventListener('click', clearLogs);
    
    document.querySelectorAll('.quick-link').forEach(el => {
        el.addEventListener('click', () => {
            const u = el.getAttribute('data-url');
            if (u) {
                urlInput.value = u;
                loadPage();
            }
        });
    });
    
    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.getAttribute('data-tab');
            if (tab) switchTab(tab);
        });
    });
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadPage();
    });
    
    // Double-click status to cycle proxy
    statusSpan.addEventListener('dblclick', cycleProxy);
    
    addLog('Ready - WebProxy for full JS', 'success');
    addLog('Double-click status to switch proxy', 'info');
    setTimeout(() => loadPage(), 100);
</script>
</body>
</html>
