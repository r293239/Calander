<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0c10;
            color: #e6edf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #010409;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            flex-shrink: 0;
        }
        .title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #f778ba);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .url-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        #url-input {
            flex: 1;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
            font-family: monospace;
        }
        select, button {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            padding: 0 16px;
            font-weight: 500;
            cursor: pointer;
            height: 40px;
        }
        button.primary { background: #238636; border-color: #2ea043; }
        button.primary:hover { background: #2ea043; }
        button:hover { background: #30363d; }
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .quick-link {
            color: #58a6ff;
            cursor: pointer;
            background: #161b22;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            border-bottom: 1px solid #30363d;
        }
        .tab {
            background: none;
            border: none;
            padding: 8px 20px;
            color: #8b949e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
        #content { flex: 1; display: flex; overflow: hidden; }
        .panel { flex: 1; display: none; overflow: auto; }
        .panel.active { display: block; }
        .source-area {
            width: 100%;
            height: 100%;
            background: #0a0c10;
            color: #e6edf3;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 12px;
            padding: 16px;
            border: none;
            resize: none;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .split-view { display: flex; height: 100%; width: 100%; }
        .split-view .source-preview {
            flex: 1;
            background: #0a0c10;
            overflow: auto;
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            border-left: 1px solid #30363d;
        }
        .log-box {
            background: #0a0c10;
            height: 100%;
            overflow-y: auto;
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry { padding: 6px 0; border-bottom: 1px solid #1e242c; }
        .log-info { color: #79c0ff; }
        .log-success { color: #56d364; }
        .log-error { color: #f85149; }
        .log-warning { color: #e3b341; }
        #status {
            background: #010409;
            border-top: 1px solid #21262d;
            padding: 6px 20px;
            font-size: 12px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
        }
        .card {
            background: #161b22;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .reconstructed-viewer {
            width: 100%;
            height: 100%;
            background: white;
            border: none;
        }
        .inline-html {
            width: 100%;
            height: 100%;
            overflow: auto;
            background: white;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="title">PROXY</div>
    <div class="url-bar">
        <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
        <select id="method-select">
            <option value="allorigins" selected>🌐 AllOrigins (Full Reconstruct)</option>
            <option value="corsproxy">🔀 CORSProxy.io</option>
            <option value="thingproxy">⚙️ ThingProxy</option>
            <option value="wayback">📦 Wayback Machine</option>
            <option value="google-cache">🗄️ Google Cache</option>
            <option value="12ft">⚡ 12ft Ladder</option>
        </select>
        <button class="primary" id="loadBtn">🚀 FETCH & RECONSTRUCT</button>
        <button id="viewRawBtn">📄 Show Reconstructed Source</button>
    </div>
    <div class="action-group">
        <button id="downloadBtn">💾 Download HTML</button>
        <button id="copySrcBtn">📋 Copy Source</button>
        <button id="clearLogsBtn">🗑️ Clear Logs</button>
    </div>
    <div class="quick-links">
        <span style="color:#6e7681">⚡ test:</span>
        <span class="quick-link" data-url="https://www.google.com">Google</span>
        <span class="quick-link" data-url="https://github.com">GitHub</span>
        <span class="quick-link" data-url="https://news.ycombinator.com">HackerNews</span>
        <span class="quick-link" data-url="https://example.com">Example</span>
        <span class="quick-link" data-url="https://httpbin.org/html">HTML Test</span>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="view">👁️ Rendered View</button>
        <button class="tab" data-tab="source">📄 Raw Source + JS</button>
        <button class="tab" data-tab="logs">📋 Logs</button>
    </div>
</div>

<div id="content">
    <!-- View panel - renders the reconstructed HTML directly -->
    <div id="view-panel" class="panel active">
        <iframe id="viewer-frame" style="width:100%;height:100%;border:none;background:white;" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
    </div>
    
    <!-- Source panel - shows full HTML + extracted JS links -->
    <div id="source-panel" class="panel">
        <textarea id="source-output" class="source-area" readonly placeholder="// Full reconstructed HTML will appear here after clicking FETCH & RECONSTRUCT\n// All JavaScript URLs are extracted and listed at the bottom"></textarea>
    </div>
    
    <!-- Logs panel -->
    <div id="logs-panel" class="panel">
        <div id="log-output" class="log-box">
            <div class="log-entry log-info">⚡ PROXY initialized</div>
            <div class="log-entry log-success">✅ Click "FETCH & RECONSTRUCT" to get full website HTML + all JS links</div>
        </div>
    </div>
</div>

<div id="status">
    <span id="status-text">● ready</span>
    <span id="url-display"></span>
</div>

<script>
    const urlInput = document.getElementById('url-input');
    const methodSelect = document.getElementById('method-select');
    const viewerFrame = document.getElementById('viewer-frame');
    const sourceOutput = document.getElementById('source-output');
    const logContainer = document.getElementById('log-output');
    const statusSpan = document.getElementById('status-text');
    const urlDisplaySpan = document.getElementById('url-display');

    let currentReconstructedHTML = '';
    let currentOriginalUrl = '';

    function addLog(msg, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        entry.textContent = `[${time}] ${msg}`;
        logContainer.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        statusSpan.textContent = msg.slice(0, 80);
        while (logContainer.children.length > 150) logContainer.removeChild(logContainer.firstChild);
    }

    // Extract ALL JavaScript URLs from HTML with absolute URL resolution
    function extractAllJsUrls(html, baseUrl) {
        const jsUrls = new Set();
        // script src extraction
        const scriptRegex = /<script\s+(?:[^>]*?\s+)?src=["']([^"']+)["']/gi;
        let match;
        while ((match = scriptRegex.exec(html)) !== null) {
            let url = match[1];
            if (url && !url.startsWith('data:') && !url.startsWith('blob:') && !url.startsWith('javascript:')) {
                try {
                    if (url.startsWith('//')) url = 'https:' + url;
                    else if (url.startsWith('/') && baseUrl) url = new URL(url, baseUrl).href;
                    else if (!url.startsWith('http') && baseUrl) url = new URL(url, baseUrl).href;
                    jsUrls.add(url);
                } catch(e) { jsUrls.add(url); }
            }
        }
        // link preload as="script"
        const preloadRegex = /<link\s+[^>]*?rel=["']preload["'][^>]*?href=["']([^"']+)["'][^>]*?as=["']script["']/gi;
        while ((match = preloadRegex.exec(html)) !== null) {
            let url = match[1];
            if (url) jsUrls.add(url);
        }
        return Array.from(jsUrls);
    }

    // Extract CSS links as well for completeness
    function extractCssUrls(html, baseUrl) {
        const cssUrls = new Set();
        const linkRegex = /<link\s+[^>]*?rel=["']stylesheet["'][^>]*?href=["']([^"']+)["']/gi;
        let match;
        while ((match = linkRegex.exec(html)) !== null) {
            let url = match[1];
            if (url) {
                try {
                    if (url.startsWith('//')) url = 'https:' + url;
                    else if (url.startsWith('/') && baseUrl) url = new URL(url, baseUrl).href;
                    else if (!url.startsWith('http') && baseUrl) url = new URL(url, baseUrl).href;
                    cssUrls.add(url);
                } catch(e) { cssUrls.add(url); }
            }
        }
        return Array.from(cssUrls);
    }

    // Build proxy fetch URL
    function getFetchUrl(originalUrl, method) {
        const encoded = encodeURIComponent(originalUrl);
        const proxies = {
            allorigins: `https://api.allorigins.win/raw?url=${encoded}`,
            corsproxy: `https://corsproxy.io/?${encoded}`,
            thingproxy: `https://thingproxy.freeboard.io/fetch/${originalUrl}`,
            wayback: `https://api.allorigins.win/raw?url=${encodeURIComponent('https://web.archive.org/web/' + originalUrl)}`,
            'google-cache': `https://api.allorigins.win/raw?url=${encodeURIComponent('https://webcache.googleusercontent.com/search?q=cache:' + encoded)}`,
            '12ft': `https://api.allorigins.win/raw?url=${encodeURIComponent('https://12ft.io/' + originalUrl)}`
        };
        return proxies[method] || proxies.allorigins;
    }

    // Main reconstruction function - fetches HTML and displays both rendered view and source
    async function fetchAndReconstruct() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) {
            addLog('❌ Enter a URL', 'error');
            return;
        }
        if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
            targetUrl = 'https://' + targetUrl;
        }
        urlInput.value = targetUrl;
        currentOriginalUrl = targetUrl;
        const method = methodSelect.value;
        
        addLog(`🔍 FETCHING: ${targetUrl} via ${method}`, 'info');
        urlDisplaySpan.textContent = targetUrl;
        
        const fetchUrl = getFetchUrl(targetUrl, method);
        addLog(`📡 Proxy URL: ${fetchUrl.substring(0, 80)}...`, 'info');
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            const response = await fetch(fetchUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const html = await response.text();
            
            addLog(`✅ Fetched ${html.length.toLocaleString()} bytes`, 'success');
            
            // Extract all JS and CSS URLs
            const jsUrls = extractAllJsUrls(html, targetUrl);
            const cssUrls = extractCssUrls(html, targetUrl);
            
            // Build enhanced source display with asset list
            let enhancedSource = html;
            const assetSection = `\n\n<!-- ============================================= -->\n<!-- RECONSTRUCTED ASSET REPORT                    -->\n<!-- ============================================= -->\n<!-- 📜 JAVASCRIPT FILES (${jsUrls.length}): -->\n${jsUrls.map(u => `<!--   ${u} -->`).join('\n')}\n\n<!-- 🎨 CSS STYLESHEETS (${cssUrls.length}): -->\n${cssUrls.map(u => `<!--   ${u} -->`).join('\n')}\n<!-- ============================================= -->\n`;
            
            currentReconstructedHTML = html + assetSection;
            sourceOutput.value = currentReconstructedHTML;
            
            // Also log the JS files found
            if (jsUrls.length > 0) {
                addLog(`📜 Found ${jsUrls.length} JavaScript files: ${jsUrls.slice(0, 3).join(', ')}${jsUrls.length > 3 ? '...' : ''}`, 'info');
            } else {
                addLog(`ℹ️ No external script tags found in HTML`, 'info');
            }
            if (cssUrls.length > 0) {
                addLog(`🎨 Found ${cssUrls.length} CSS files`, 'info');
            }
            
            // Render the HTML inside iframe using srcdoc (bypasses X-Frame-Options!)
            // This is the key fix - use srcdoc to display the reconstructed HTML directly
            const renderedHtml = `<!DOCTYPE html>\n<html>\n<head>\n<base href="${targetUrl}" target="_blank">\n<meta charset="UTF-8">\n</head>\n<body>${escapeHtmlForSrcdoc(html)}</body>\n</html>`;
            
            // Use srcdoc to render the page properly
            viewerFrame.srcdoc = html;
            
            addLog(`🎉 Page reconstructed and rendered! View full source in "Raw Source + JS" tab`, 'success');
            
        } catch (error) {
            addLog(`❌ Fetch failed: ${error.message}`, 'error');
            sourceOutput.value = `// ERROR: Could not fetch ${targetUrl}\n// ${error.message}\n\n// Try a different proxy method or URL.`;
            viewerFrame.srcdoc = `<html><body style="background:#0a0c10;color:white;padding:40px;font-family:monospace"><h2>❌ Failed to load</h2><p>${error.message}</p><p>URL: ${targetUrl}</p><p>Try a different proxy method from the dropdown.</p></body></html>`;
        }
    }
    
    // Helper to escape content for srcdoc (though we can just pass raw HTML)
    function escapeHtmlForSrcdoc(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    // Alternative: fetch using iframe with proxy (fallback)
    function loadInIframeTraditional() {
        let targetUrl = urlInput.value.trim();
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
        const method = methodSelect.value;
        let proxyUrl;
        if (method === 'allorigins') {
            proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
            addLog(`⚠️ Traditional iframe may not render due to MIME types, using srcdoc method instead`, 'warning');
            fetchAndReconstruct();
            return;
        }
        proxyUrl = getFetchUrl(targetUrl, method);
        viewerFrame.src = proxyUrl;
        addLog(`🌐 Loading iframe: ${proxyUrl}`, 'info');
    }
    
    // Download reconstructed HTML
    function downloadHTML() {
        if (!currentReconstructedHTML) {
            addLog('No HTML in memory. Click FETCH & RECONSTRUCT first.', 'warning');
            return;
        }
        const blob = new Blob([currentReconstructedHTML], { type: 'text/html' });
        const a = document.createElement('a');
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = `reconstructed_${Date.now()}.html`;
        a.click();
        URL.revokeObjectURL(url);
        addLog('💾 HTML downloaded with asset manifest', 'success');
    }
    
    // Copy source to clipboard
    function copySource() {
        if (!currentReconstructedHTML) {
            addLog('No source to copy', 'error');
            return;
        }
        navigator.clipboard.writeText(currentReconstructedHTML).then(() => {
            addLog('📋 Full reconstructed source copied to clipboard', 'success');
        }).catch(() => addLog('Clipboard failed', 'error'));
    }
    
    // Show the source tab
    function showSourceTab() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('source-panel').classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector('.tab[data-tab="source"]').classList.add('active');
        addLog('Switched to source view', 'info');
    }
    
    function clearLogs() {
        logContainer.innerHTML = '<div class="log-entry log-info">🧹 Logs cleared</div><div class="log-entry log-success">Ready for next request</div>';
        addLog('Logs cleared', 'info');
    }
    
    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`${tabId}-panel`).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
    }
    
    // Event listeners
    document.getElementById('loadBtn').addEventListener('click', fetchAndReconstruct);
    document.getElementById('viewRawBtn').addEventListener('click', showSourceTab);
    document.getElementById('downloadBtn').addEventListener('click', downloadHTML);
    document.getElementById('copySrcBtn').addEventListener('click', copySource);
    document.getElementById('clearLogsBtn').addEventListener('click', clearLogs);
    
    document.querySelectorAll('.quick-link').forEach(el => {
        el.addEventListener('click', () => {
            const u = el.getAttribute('data-url');
            if (u) {
                urlInput.value = u;
                fetchAndReconstruct();
            }
        });
    });
    
    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const tab = btn.getAttribute('data-tab');
            if (tab) switchTab(tab);
        });
    });
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchAndReconstruct();
    });
    
    // Initial load
    setTimeout(() => {
        addLog('✨ RECONSTRUCTION MODE ACTIVE', 'success');
        addLog('💡 Click FETCH & RECONSTRUCT — I will fetch the FULL HTML, extract ALL JavaScript URLs, and render the page properly', 'info');
        fetchAndReconstruct();
    }, 200);
</script>
</body>
</html>
