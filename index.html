<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Proxy Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: white; font-family: monospace; }
        #toolbar { display: flex; padding: 15px; background: #2d2d2d; gap: 10px; }
        #url-input { flex: 1; padding: 12px; background: #3c3c3c; border: 1px solid #555; color: white; border-radius: 5px; font-size: 14px; }
        button { padding: 12px 25px; background: #0e639c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1177bb; }
        #content { padding: 20px; background: white; color: black; min-height: calc(100vh - 70px); }
        #status { padding: 10px; color: #6a9955; }
        a { color: #007acc; }
    </style>
</head>
<body>
    <div id="toolbar">
        <input type="text" id="url-input" placeholder="Enter website URL..." value="https://example.com">
        <button id="go-btn">Browse</button>
        <button id="reload-btn">↻</button>
    </div>
    <div id="status">Ready</div>
    <div id="content"></div>
    
    <script>
        const input = document.getElementById('url-input');
        const content = document.getElementById('content');
        const status = document.getElementById('status');
        const goBtn = document.getElementById('go-btn');
        const reloadBtn = document.getElementById('reload-btn');
        
        let currentUrl = 'https://example.com';
        
        async function fetchPage(url) {
            status.textContent = 'Loading...';
            content.innerHTML = '<p style="text-align:center;padding:50px">Loading page...</p>';
            
            try {
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const html = await response.text();
                content.innerHTML = html;
                currentUrl = url;
                input.value = url;
                status.textContent = `Loaded: ${url}`;
                
                // Re-write links to go through proxy
                document.querySelectorAll('a').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('#')) {
                        link.onclick = (e) => {
                            e.preventDefault();
                            const newUrl = new URL(href, currentUrl).href;
                            fetchPage(newUrl);
                        };
                    }
                });
                
            } catch (error) {
                content.innerHTML = `<p style="color:red;padding:50px;text-align:center">Error: ${error.message}</p>`;
                status.textContent = `Failed: ${error.message}`;
            }
        }
        
        function navigate() {
            let url = input.value.trim();
            if (!url) return;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            fetchPage(url);
        }
        
        goBtn.addEventListener('click', navigate);
        reloadBtn.addEventListener('click', () => fetchPage(currentUrl));
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') navigate();
        });
        
        // Initial load
        fetchPage('https://example.com');
    </script>
</body>
</html>
